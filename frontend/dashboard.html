<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script src="js/config.js"></script>
  </head>
  <body>
    <p>Redirecting to your dashboard...</p>
    <script>
      (async function redirectToRoleDashboard() {
        const apiBaseUrl = window.APP_CONFIG?.API_BASE_URL || "http://localhost:4000/api";
        try {
          const response = await fetch(`${apiBaseUrl}/auth/me`, {
            method: "GET",
            credentials: "include",
            headers: {
              "Content-Type": "application/json"
            }
          });

          if (!response.ok) {
            window.location.replace("home.html");
            return;
          }

          const data = await response.json();
          const employee = data?.employee || null;

          if (employee) {
            localStorage.setItem("auth_employee", JSON.stringify(employee));
          }

          const baseTarget =
            employee?.is_admin === true ? "dashboards/admin-dashboard.html" : "dashboards/employee-dashboard.html";
          const target =
            employee?.password_reset_required === true ? `${baseTarget}?force_password_change=1` : baseTarget;

          window.location.replace(target);
        } catch (_error) {
          window.location.replace("home.html");
        }
      })();
    </script>
  </body>
</html>
