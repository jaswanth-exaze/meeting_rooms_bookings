<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exaze | Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="https://exazeit.com/wp-content/uploads/2020/09/exaze-favi-150x150.png" sizes="32x32">
    <!-- Flatpickr Date/Time Picker -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/config.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script defer src="js/login.js"></script>
    <script defer src="js/pickers-init.js"></script>
  </head>
  <body class="page-home">
    <main class="page-container home-layout">
      <section class="card-surface home-main fade-rise">
        <header class="top-nav">
          <a class="logo-wrap" href="home.html" aria-label="Exaze home">
            <img src="assets/exaze-logo.png" alt="Exaze logo" />
          </a>
          <div class="brand-copy">
            <p class="brand-kicker">Workspace Booking Platform</p>
            <p class="brand-title">Book The Right Room In Seconds</p>
          </div>
          <div class="top-nav-actions">
            <button
              class="theme-toggle"
              id="themeToggleBtn"
              type="button"
              aria-label="Switch to dark mode"
              aria-pressed="false"
            >
              Dark Mode
            </button>
          </div>
        </header>

        <section class="hero-block">
          <div class="hero-content fade-rise delay-1">
            <div class="hero-slideshow-container">
              <img
                class="hero-illustration hero-slide active"
                src="assets/home_page_image_1.png"
                alt="Team collaborating in a modern meeting room"
                data-slide="0"
              />
              <img
                class="hero-illustration hero-slide"
                src="assets/home_page_image.png"
                alt="Professional workspace environment"
                data-slide="1"
              />
              <img
                class="hero-illustration hero-slide"
                src="assets/home_page_image_2.png"
                alt="Modern office collaboration space"
                data-slide="2"
              />
              <img
                class="hero-illustration hero-slide"
                src="assets/home_page_image_3.png"
                alt="Meeting room with advanced technology"
                data-slide="3"
              />
              <div class="hero-slideshow-dots">
                <button class="slideshow-dot active" data-slide="0" aria-label="Show slide 1"></button>
                <button class="slideshow-dot" data-slide="1" aria-label="Show slide 2"></button>
                <button class="slideshow-dot" data-slide="2" aria-label="Show slide 3"></button>
                <button class="slideshow-dot" data-slide="3" aria-label="Show slide 4"></button>
              </div>
            </div>
          </div>
        </section>

        <section class="featured-section fade-rise delay-2">
          <div class="section-head">
            <h2>Featured Rooms</h2>
            <div class="featured-filter-wrap">
              <label for="featured-location-filter">Location</label>
              <select id="featured-location-filter" class="featured-location-filter" name="featured_location_id">
                <option value="">All Locations</option>
              </select>
            </div>
          </div>
          <div class="rooms-grid">
            <article class="room-card room-loading">
              <div class="room-body">
                <h3 class="room-title">Loading featured rooms...</h3>
                <p class="room-meta">Fetching high-quality room previews.</p>
              </div>
            </article>
          </div>
          <p id="booking-message" class="auth-foot booking-message" role="status" aria-live="polite"></p>
        </section>
      </section>

      <aside class="card-surface home-auth-card fade-rise delay-1" aria-label="Quick sign in">
        <img class="mini-illustration" src="assets/cell_pod_1.png" alt="Professional working at desk" />
        <form id="login-form" action="home.html">
          <label class="home-auth-label" for="homeLoginEmail">Work Email</label>
          <input
            id="homeLoginEmail"
            class="input-field input-navy"
            type="email"
            name="email"
            placeholder="Email"
            autocomplete="username"
            required
          />
          <label class="home-auth-label" for="homeLoginPassword">Password</label>
          <input
            id="homeLoginPassword"
            class="input-field input-green"
            type="password"
            name="password"
            placeholder="Password"
            autocomplete="current-password"
            required
          />
          <div class="auth-inline">
            <span>Forgot password?</span>
            <span class="auth-reset-note">Contact your admin to reset it.</span>
          </div>
          <button class="btn btn-primary" type="submit" style="width: 100%">Sign In</button>
        </form>
        <p id="auth-message" class="auth-foot" role="status" aria-live="polite">New employee? Contact your admin to get access.</p>
      </aside>
    </main>

    <div id="room-detail-modal" class="room-modal" hidden>
      <div class="room-modal-backdrop" data-close-modal></div>
      <section class="room-modal-card room-booking-modal-card home-room-modal-card" role="dialog" aria-modal="true" aria-labelledby="room-detail-title">
        <button class="room-modal-close" type="button" aria-label="Close details" data-close-modal>&times;</button>
        <div class="room-booking-modal-layout">
          <div class="room-booking-modal-media">
            <img id="room-detail-image" class="room-modal-image" src="assets/image(3).png" alt="Room preview" />
          </div>
          <div class="room-booking-modal-summary home-room-modal-summary">
            <h3 id="room-detail-title">Room</h3>
            <p id="room-detail-meta" class="room-meta"></p>
            <p id="room-detail-description" class="room-modal-description"></p>
          </div>
        </div>
      </section>
    </div>

    <script src="js/home.js"></script>
  </body>
</html>
